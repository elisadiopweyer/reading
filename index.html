<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Reading Trajectories</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <h1>
            Reading Trajectories
            <span
              class="hint"
              tabindex="0"
              data-tooltip="Scores after netting out the selected text-difficulty measure."
            >Adjusted</span>
            for Text Difficulty
          </h1>
          <div class="version-tabs" id="versionTabs" role="tablist">
            <button type="button" class="vtab" data-tab="v1" role="tab">v1 · June pilot</button>
            <button type="button" class="vtab" data-tab="v2" role="tab">v2 · New corpus (actual-text)</button>
          </div>
          <select id="scopePicker" class="scope-picker" aria-label="Class">
            <optgroup id="og-v1" label="June pilot (NY/TN) — metadata-scored">
              <option value="all" selected>All classes (pooled)</option>
              <option value="dziuma603">DZIUMA603</option>
              <option value="dziuma602">DZIUMA602</option>
              <option value="gallo603">Gallo603</option>
              <option value="persaud601">persaud601</option>
              <option value="henry">henry</option>
              <option value="persaud602">Persaud602</option>
              <option value="hughes604">Hughes604</option>
              <option value="buon">buon</option>
              <option value="gallo602">Gallo602</option>
              <option value="hughes657">Hughes657</option>
              <option value="hughes656">Hughes656</option>
            </optgroup>
            <optgroup id="og-v2" label="New corpus (actual-text re-score)">
              <option value="newcorpus">New corpus (pooled)</option>
              <option value="4gth3d">Insights · 4GTH3D</option>
              <option value="b8srbn">Insights · B8SRBN</option>
              <option value="kkmxmr">Insights · KKMXMR</option>
              <option value="8valvc">Insights · 8VALVC</option>
              <option value="j2fbgt">Insights · J2FBGT</option>
              <option value="5wp9l4">Insights · 5WP9L4</option>
              <option value="dzq3xh">Insights · DZQ3XH</option>
              <option value="3hjbb7">Insights · 3HJBB7</option>
              <option value="6am9sv">Insights · 6AM9SV</option>
              <option value="wq73az">Insights · WQ73AZ</option>
              <option value="jgveh2">Insights · JGVEH2</option>
              <option value="mvhh2y">Churn · MVHH2Y</option>
            </optgroup>
          </select>
        </div>
        <div class="summary" id="summary"></div>
      </header>

      <div id="researchView">
        <section class="controls" aria-label="Chart controls">
          <div class="chart-meta">Weekly view · full year of class activity</div>

          <div class="toggle-stack">
            <label class="check-row control-row">
              <input type="checkbox" id="fitToggle" checked />
              <span class="fit-swatch"></span>
              <span
                class="hint"
                tabindex="0"
                data-tooltip="Adds an ordinary least squares line for each selected score series."
              >Best fit</span>
            </label>
            <label class="check-row control-row">
              <input type="checkbox" id="seToggle" />
              <span
                class="hint"
                tabindex="0"
                data-tooltip="Shades a 95% confidence band around each weekly mean (±1.96 standard errors of the mean across student-week cells)."
              >Std. errors (95% band)</span>
            </label>
            <label class="check-row control-row">
              <input type="checkbox" id="fitOnlyToggle" />
              <span
                class="hint"
                tabindex="0"
                data-tooltip="Hides the weekly data lines and points, leaving only each series' best-fit trendline."
              >Trendlines only</span>
            </label>
            <fieldset class="series-picker" id="seriesPicker">
              <legend>Scoring methods</legend>
            </fieldset>
          </div>
        </section>

        <section class="explain" aria-label="What is plotted">
          <div class="equations" id="modelEquation"></div>
          <p class="plot-copy">
            Each point is the period mean of
            <span
              class="hint"
              tabindex="0"
              data-tooltip="The average score for student i in relative week t."
            >Score<sub>it</sub></span>.
            <span
              class="hint"
              tabindex="0"
              data-tooltip="Adjusted lines remove the part of score predicted by differences in text difficulty, then put difficulty back at the sample mean."
            >Adjusted</span>
            lines hold difficulty constant.
          </p>
        </section>

        <section class="chart-section" aria-label="Adjusted trajectory chart">
          <div class="chart-head">
            <h2 id="chartTitle">Weekly Score Trajectory</h2>
            <span class="chart-meta">Average score, 0 to 1 scale</span>
          </div>
          <div class="chart-wrap">
            <svg id="chart" role="img" aria-labelledby="chartTitle"></svg>
          </div>
        </section>

        <section class="table-section" aria-label="Trajectory data">
          <div class="table-wrap">
            <table>
              <thead id="tableHead"></thead>
              <tbody id="tableBody"></tbody>
            </table>
          </div>
        </section>
      </div>

    </main>

    <script src="./app.js"></script>

    <script>
      // inline editor (same pattern as emdw's /edit), gated behind a code so
      // only the code-holder can edit. on unlock it loads inline.js wired to
      // the save endpoint, which commits edits to the repo (commit -> redeploy).
      (function () {
        var HASH = "cd541da1035193d04273d5a0b17030546a2e1a6aa7693f355fc528e151421113";
        var STORE = "vbm-edit-code";
        var p = location.pathname.replace(/\/+$/, "");
        var wantEdit =
          /[?&]edit(?:=1)?(?:&|$)/.test(location.search) ||
          location.hash.replace("#", "") === "edit" ||
          /(?:^|\/)edit$/.test(p);

        function sha256hex(str) {
          return crypto.subtle.digest("SHA-256", new TextEncoder().encode(str)).then(function (buf) {
            return Array.from(new Uint8Array(buf))
              .map(function (b) { return b.toString(16).padStart(2, "0"); })
              .join("");
          });
        }
        function load(code, auto) {
          var s = document.createElement("script");
          s.src = "/inline.js";
          if (auto) s.setAttribute("data-auto", "1");
          s.setAttribute("data-save", "/api/inline-save?code=" + encodeURIComponent(code));
          document.body.appendChild(s);
        }

        var saved = null;
        try { saved = localStorage.getItem(STORE); } catch (e) {}
        if (saved) {
          sha256hex(saved).then(function (h) {
            if (h === HASH) load(saved, wantEdit);
            else { try { localStorage.removeItem(STORE); } catch (e) {} if (wantEdit) gate(); }
          });
          return;
        }
        if (wantEdit) gate();

        function gate() {
          var wrap = document.createElement("div");
          wrap.className = "edit-gate";
          wrap.innerHTML =
            '<form class="edit-card">' +
            '<div class="edit-title">edit mode</div>' +
            '<input class="edit-input" type="password" placeholder="code" autocomplete="off" spellcheck="false" />' +
            '<div class="edit-hint">this page&rsquo;s copy is editable inline &mdash; for elisa only.</div>' +
            '<div class="edit-error" hidden>not quite &mdash; try again.</div>' +
            "</form>";
          document.body.appendChild(wrap);
          var form = wrap.querySelector(".edit-card");
          var input = wrap.querySelector(".edit-input");
          var err = wrap.querySelector(".edit-error");
          setTimeout(function () { input.focus(); }, 30);
          form.addEventListener("submit", function (e) {
            e.preventDefault();
            var code = input.value;
            sha256hex(code).then(function (h) {
              if (h === HASH) {
                try { localStorage.setItem(STORE, code); } catch (e) {}
                wrap.remove();
                load(code, true);
              } else {
                err.hidden = false;
                form.classList.remove("shake");
                void form.offsetWidth;
                form.classList.add("shake");
                input.value = "";
                input.focus();
              }
            });
          });
          wrap.addEventListener("click", function (e) { if (e.target === wrap) wrap.remove(); });
          document.addEventListener("keydown", function esc(e) {
            if (e.key === "Escape") { wrap.remove(); document.removeEventListener("keydown", esc); }
          });
        }
      })();
    </script>
  </body>
</html>
