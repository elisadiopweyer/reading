<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Reading Trajectories</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <h1>
            Reading Trajectories
            <span
              class="hint"
              tabindex="0"
              data-tooltip="Scores after netting out the selected text-difficulty measure."
            >Adjusted</span>
            for Text Difficulty
          </h1>
        </div>
        <div class="summary" id="summary"></div>
      </header>

      <section class="controls" aria-label="Chart controls">
        <div class="segmented" role="tablist" aria-label="Period">
          <button class="segment active" type="button" data-period="week" aria-selected="true">Week</button>
          <button class="segment" type="button" data-period="month" aria-selected="false">Month</button>
        </div>

        <div class="toggle-stack">
          <label class="check-row control-row">
            <input type="checkbox" id="fitToggle" checked />
            <span class="fit-swatch"></span>
            <span
              class="hint"
              tabindex="0"
              data-tooltip="Adds an ordinary least squares line for each selected score series."
            >Best fit</span>
          </label>
          <fieldset class="series-picker" id="seriesPicker">
            <legend>Scoring methods</legend>
          </fieldset>
        </div>
      </section>

      <section class="explain" aria-label="What is plotted">
        <div class="equations" id="modelEquation"></div>
        <p class="plot-copy">
          Each point is the period mean of
          <span
            class="hint"
            tabindex="0"
            data-tooltip="The average score for student i in relative week or month t."
          >Score<sub>it</sub></span>.
          <span
            class="hint"
            tabindex="0"
            data-tooltip="Adjusted lines remove the part of score predicted by differences in text difficulty, then put difficulty back at the sample mean."
          >Adjusted</span>
          lines hold difficulty constant.
        </p>
      </section>

      <section class="chart-section" aria-label="Adjusted trajectory chart">
        <div class="chart-head">
          <h2 id="chartTitle">Weekly Score Trajectory</h2>
          <span class="chart-meta">Average score, 0 to 1 scale</span>
        </div>
        <div class="chart-wrap">
          <svg id="chart" role="img" aria-labelledby="chartTitle"></svg>
        </div>
      </section>

      <section class="table-section" aria-label="Trajectory data">
        <div class="table-wrap">
          <table>
            <thead id="tableHead"></thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
